name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'assets/**'
      - 'torifuda/**'
      - 'sw.js'
      - 'workbox-*.js'
      - 'manifest.webmanifest'
      - 'icon.png'
      - 'thumbnail.png'
      - '.nojekyll'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Sync build output to docs/ and repository root
        run: |
          rm -rf docs
          cp -r dist docs
          touch docs/.nojekyll

          cp -R dist/. .
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'Deploy to GitHub Pages [skip ci]'
          commit_author: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
